<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スマホ版UIモック</title>
<style>
  /* ============ レイアウト ============ */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    /* トーンB(決定): 羊皮紙調の背景 */
    background:
      radial-gradient(circle at 30% 15%, rgba(255,244,205,.55), transparent 55%),
      linear-gradient(180deg, #cbb98f, #b7a276);
    color: #fff;
  }
  /* S7: タブレット・PCでは幅430相当で頭打ちにして中央寄せ */
  .frame { width: 100%; max-width: 430px; min-height: 100dvh; display: flex; flex-direction: column; }

  /* ---- 広告領域(最上部・アンカーバナー想定: 全幅・高さはSDK取得値で可変 50〜90dp) ---- */
  .adArea {
    height: 50px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    background: rgba(60,40,10,.12);
    border-bottom: 1px dashed rgba(60,40,10,.45); color: rgba(60,40,10,.55);
    font-size: 12px; letter-spacing: .15em;
  }

  header { display: flex; align-items: center; gap: 6px; height: 50px; padding: 0 6px; flex: 0 0 auto; }
  .hdrBtn {
    width: 76px; height: 40px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; gap: 2px;
    border-radius: 8px; font-size: 14px; font-weight: bold;
    background: linear-gradient(180deg, #6b4a26, #4c3116); color: #ffe9b8;
    border: 1px solid #2e1d0a; box-shadow: inset 0 1px 0 rgba(255,230,160,.5), 0 2px 3px rgba(40,20,0,.4);
  }
  /* レシピ名: 最大9文字が下限幅(360dp)で収まるサイズ */
  .hdrTitle { flex: 1 1 auto; text-align: center; font-size: 20px; font-weight: bold;
    color: #3a2a10; text-shadow: 0 1px 0 rgba(255,255,255,.5);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* S2: 固定要素はそのまま、上下余白を伸ばして中央寄せ */
  main { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center;
    gap: 8px; padding: 6px 12px 8px; }

  /* ---- ウィンドウ共通(紺+白枠+金縁) ---- */
  .win {
    background: linear-gradient(180deg, #23255c, #14163e); color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    box-shadow: 0 0 0 1px #14163e, 0 0 0 3px #caa74f, 0 3px 6px rgba(40,20,0,.35);
  }

  /* ---- ぬいパワー行(タップでサイクル開閉。横スクロール対応) ---- */
  .powerRow { padding: 6px 8px; cursor: pointer; user-select: none; }
  .powerInner { display: flex; align-items: center; gap: 8px; min-height: 34px; }
  .powerLabel { font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 6px;
    background: #caa74f; color: #241a05; flex: 0 0 auto; }
  .viewCompact, .viewCycle { display: flex; align-items: center; gap: 6px; flex: 1 1 auto; min-width: 0; }
  .viewCycle { display: none; overflow-x: auto; padding: 4px 2px;
    scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .viewCycle::-webkit-scrollbar { display: none; }
  .cycleOpen .viewCompact { display: none; }
  .cycleOpen .viewCycle { display: flex; }
  .chip { position: relative; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-weight: bold; flex: 0 0 auto; }
  .chipL { min-width: 58px; height: 32px; font-size: 15px; }
  .chipS { min-width: 46px; height: 27px; font-size: 12px; }
  .pw-weak   { background: #7da7d9; color: #fff; }
  .pw-normal { background: #63b663; color: #fff; }
  .pw-strong { background: #ef9f45; color: #fff; }
  .pw-max    { background: #dd5252; color: #fff; }
  .pw-q      { background: #9a9aa5; color: #fff; }
  .chipCurrent { outline: 2px solid #fff; outline-offset: 2px; }
  /* D5: 精神統一固定中は残りターン数と同数の「きらめき」バッジ(縦長楕円)を付ける。
     実装時は画像素材に置き換える(ここではCSSによる仮表現) */
  .sparkles { position: absolute; top: -8px; left: 4px; display: flex; gap: 2px; }
  .spark { width: 7px; height: 13px; border-radius: 50%;
    background: radial-gradient(ellipse at 50% 35%, #ffffff 0%, #fff8c8 45%, #ffd34d 100%);
    box-shadow: 0 0 4px 1px rgba(255, 240, 150, .9); }
  /* 布特性バッジ(案1・T番号なし): 発動ターンのエントリに特性色バッジ。次周回到達分は半透明 */
  .traitBadge { position: absolute; right: -5px; top: -5px; width: 15px; height: 15px;
    border-radius: 50%; font-size: 10px; line-height: 15px; text-align: center; color: #fff;
    border: 1px solid rgba(255,255,255,.8); }
  .tb-regen { background: #2e9e44; }
  .tb-faded { opacity: .45; }
  .chevron { flex: 0 0 auto; font-size: 11px; opacity: .6; transition: transform .15s; }
  .cycleOpen .chevron { transform: rotate(180deg); }

  /* ---- 布グリッド(D48: 縦のみ縮小可) ---- */
  .gridArea { display: flex; justify-content: center; }
  .grid { display: grid; grid-template-columns: repeat(3, 88px); gap: 8px;
    padding: 10px; border-radius: 12px;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 6px, transparent 6px 12px),
      linear-gradient(180deg, #3f7a46, #2f5f36);
    border: 2px solid #fff; box-shadow: 0 0 0 3px #caa74f, 0 3px 8px rgba(40,20,0,.35);
  }
  .cell { width: 88px; height: 58px; border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-size: 28px; font-weight: bold;
    border: 1px solid rgba(0,0,0,.25);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55), 0 2px 2px rgba(20,30,10,.3); }
  .c-normal { background: #f7f1de; color: #3a3220; }
  .c-yellow { background: #ffe66b; color: #6b5900; }
  .c-done   { background: #58c26a; color: #fff; }
  .c-over   { background: #e2574d; color: #fff; }

  /* ---- 数値・メッセージ領域(D45: 2行×4列グリッド)
     1行目: ターン/集中力/誤差、2行目1〜3列: メッセージ欄、4列目1〜2行: 1手戻す ---- */
  /* 数値は最大桁数分の幅を予約(ターン2桁・集中力3桁・誤差4桁)し、
     ラベル位置を桁数によらず固定する。列は行幅に均等配分(D50) */
  .statusGrid { display: grid;
    grid-template-columns: max-content max-content max-content max-content;
    grid-template-rows: auto auto; justify-content: space-between;
    align-items: center; color: #3a2a10; font-weight: bold; }
  /* D50: 1行目(数値行)は高さを広めに取り、ラベルと数値の下端を揃える */
  .stat { display: flex; align-items: flex-end; justify-content: flex-start; gap: 4px;
    font-size: 13px; line-height: 1; min-height: 40px; padding-bottom: 4px; }
  /* 数値サイズは「誤差が4桁」でも下限幅(360dp)ではみ出さない上限
     (列を内容幅に詰めることで 22px を確保) */
  .stat b { font-size: 22px; line-height: 1; }
  /* 各数値は最大桁数分の幅を常時確保(桁数変化でラベル位置が動かないように) */
  .turnNum { min-width: 27px; text-align: left; }
  .concNum { min-width: 40px; text-align: left; }
  .errNum { min-width: 52px; text-align: left; }
  /* 集中力のラベルは「残り/集中力」の2行表記(左端揃え) */
  .statLbl2 { font-size: 11px; line-height: 1.2; text-align: left; }
  .undoBtn { grid-column: 4; grid-row: 1 / 3; align-self: center; justify-self: end;
    height: 44px; padding: 0 8px; border-radius: 8px; font-size: 12px; font-weight: bold;
    background: linear-gradient(180deg, #23255c, #14163e); color: #fff;
    border: 2px solid #fff; box-shadow: 0 0 0 2px #caa74f; }
  /* メッセージ欄: ウィンドウ調にしない(ボタンと混同するため)。
     上辺の罫線(1〜3列目の幅)で数値行と区別する */
  .msgCell { grid-column: 1 / 4; grid-row: 2;
    border-top: 2px solid rgba(60, 40, 10, .45);
    min-height: 28px; padding: 4px 4px 0; display: flex; align-items: center;
    justify-content: center; text-align: center;
    font-size: 13px; line-height: 1.4; cursor: pointer; user-select: none; }

  /* ---- 特技 5行4列 ---- */
  .skills { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; }
  .skill { position: relative; height: 44px; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    background: linear-gradient(180deg, #23255c, #14163e); color: #fff;
    border: 2px solid #fff; box-shadow: 0 0 0 1px #14163e, 0 0 0 2px #caa74f, 0 2px 4px rgba(40,20,0,.3); }
  .skName { font-size: 12px; font-weight: bold; white-space: nowrap; }
  /* ぬいパワーシフトのみ特技名2行(+コスト)の3行レイアウト(ボタン幅の均等化) */
  .skName2 { display: flex; flex-direction: column; align-items: center; line-height: 1.05; }
  .skCost { font-size: 10px; opacity: .75; }
  .skill:disabled { opacity: .4; }
  .skill.selected { background: linear-gradient(180deg, #b6903a, #8d6a1f); }
  .skill.finish { background: linear-gradient(180deg, #7c2f2f, #571c1c); }

  .caption { text-align: center; font-size: 10px; color: rgba(60,40,10,.55); padding: 2px 0 6px; flex: 0 0 auto; }

  /* ---- 結果オーバーレイ(D40/D42〜D44。プレイ画面の上に重ねる) ---- */
  .resultScrim { position: fixed; inset: 0; z-index: 20;
    background: rgba(10, 8, 2, .55);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; }
  .resultScrim[hidden] { display: none; }
  .resultWin { width: 100%; max-width: 320px; padding: 18px 16px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    background: linear-gradient(180deg, #23255c, #14163e); color: #fff;
    border: 2px solid #fff; border-radius: 10px;
    box-shadow: 0 0 0 1px #14163e, 0 0 0 4px #caa74f, 0 8px 24px rgba(0,0,0,.5); }
  .resultLabel { font-size: 14px; font-weight: bold; color: #ffe9b8; letter-spacing: .2em; text-indent: .2em; }
  .resultStars { font-size: 40px; line-height: 1; letter-spacing: .1em;
    color: #ffd34d; text-shadow: 0 0 8px rgba(255, 211, 77, .6); }
  .resultStars .starOff { color: rgba(255,255,255,.25); text-shadow: none; }
  .resultRows { width: 100%; display: flex; flex-direction: column; gap: 6px;
    padding: 8px 12px; border-top: 1px solid rgba(255,255,255,.25);
    border-bottom: 1px solid rgba(255,255,255,.25); }
  .resultRow { display: flex; align-items: baseline; font-size: 13px; font-weight: bold; }
  .resultRow b { margin-left: auto; font-size: 20px; line-height: 1; }
  .resultBtns { width: 100%; display: flex; gap: 8px; }
  .resultBtn { flex: 1 1 0; height: 46px; border-radius: 8px; font-size: 14px; font-weight: bold;
    background: linear-gradient(180deg, #2c2f6b, #1a1c4a); color: #fff;
    border: 2px solid #fff; box-shadow: 0 0 0 2px #caa74f; }
  .resultBtn.primary { background: linear-gradient(180deg, #b6903a, #8d6a1f); }
  .resultUndo { align-self: center; height: 34px; padding: 0 12px; border-radius: 8px;
    font-size: 12px; font-weight: bold; background: transparent; color: #cdd3ff;
    border: 1px solid rgba(255,255,255,.5); }
</style>
</head>
<body>
<div class="frame">
  <!-- D46: 広告表示領域(ヘッダーと同程度の高さ) -->
  <div class="adArea">アンカー広告(全幅・高さ50〜90dp可変)</div>

  <!-- D47: 左右ボタンは同サイズ、レシピ名は中央 -->
  <header>
    <button class="hdrBtn" type="button" onclick="location.href='./recipe-select.html'">◀ 戻る</button>
    <div class="hdrTitle">カテドラルローブ</div>
    <button class="hdrBtn" type="button">ログ</button>
  </header>

  <main>
    <!-- ぬいパワー行: 現在+3つ先。タップでサイクル全体(横スクロール)に切替 -->
    <section class="powerRow win" id="powerRow">
      <div class="powerInner">
        <span class="powerLabel">ぬいパワー</span>
        <div class="viewCompact">
          <span class="chip chipL pw-strong">強い<span class="sparkles"><i class="spark"></i><i class="spark"></i></span></span>
          <span class="chip chipL pw-q">?</span>
          <span class="chip chipL pw-weak">弱い</span>
          <span class="chip chipL pw-max">最強</span>
        </div>
        <div class="viewCycle">
          <span class="chip chipS pw-normal">普通</span>
          <span class="chip chipS pw-strong chipCurrent">強い<span class="sparkles"><i class="spark"></i><i class="spark"></i></span></span>
          <span class="chip chipS pw-q">?</span>
          <span class="chip chipS pw-weak">弱い</span>
          <span class="chip chipS pw-max">最強<span class="traitBadge tb-regen">再</span></span>
          <span class="chip chipS pw-normal">普通</span>
          <span class="chip chipS pw-strong">強い</span>
          <span class="chip chipS pw-weak">弱い</span>
          <span class="chip chipS pw-q">?<span class="traitBadge tb-regen">再</span></span>
          <span class="chip chipS pw-max">最強</span>
        </div>
        <span class="chevron">▼</span>
      </div>
    </section>

    <!-- 布グリッド(再生布) -->
    <section class="gridArea">
      <div class="grid">
        <button class="cell c-normal" type="button">46</button>
        <button class="cell c-yellow" type="button">3</button>
        <button class="cell c-done" type="button">0</button>
        <button class="cell c-normal" type="button">27</button>
        <button class="cell c-normal" type="button">88</button>
        <button class="cell c-normal" type="button">12</button>
        <button class="cell c-done" type="button">0</button>
        <button class="cell c-over" type="button">-6</button>
        <button class="cell c-normal" type="button">62</button>
      </div>
    </section>

    <!-- D45: 数値・メッセージ領域(2行×4列。メッセージ欄タップでサンプル切替) -->
    <div class="statusGrid">
      <span class="stat">ターン <b class="turnNum">6</b></span>
      <span class="stat"><span class="statLbl2">残り<br>集中力</span> <b class="concNum">168</b></span>
      <span class="stat">誤差 <b class="errNum">57</b></span>
      <button class="undoBtn" type="button">↩ 1手戻す</button>
      <div class="msgCell" id="msgWin">消費集中力が 半分になった！</div>
    </div>

    <!-- 特技 5行4列(§5.3.1) -->
    <section class="skills" id="skills">
      <button class="skill" type="button"><span class="skName">ヨコぬい</span><span class="skCost">8</span></button>
      <button class="skill" type="button"><span class="skName">逆たすきぬい</span><span class="skCost">7</span></button>
      <button class="skill" type="button"><span class="skName">2倍ぬい</span><span class="skCost">9</span></button>
      <button class="skill" type="button"><span class="skName skName2"><span>ぬいパワー</span><span>シフト</span></span><span class="skCost">7</span></button>

      <button class="skill" type="button"><span class="skName">水平ぬい</span><span class="skCost">10</span></button>
      <button class="skill" type="button"><span class="skName">巻きこみぬい</span><span class="skCost">13</span></button>
      <button class="skill" type="button"><span class="skName">3倍ぬい</span><span class="skCost">12</span></button>
      <button class="skill" type="button"><span class="skName">しつけがけ</span><span class="skCost">13</span></button>

      <button class="skill" type="button"><span class="skName">滝のぼり</span><span class="skCost">8</span></button>
      <button class="skill" type="button"><span class="skName">みだれぬい</span><span class="skCost">7</span></button>
      <button class="skill" type="button"><span class="skName">ねらいぬい</span><span class="skCost">16</span></button>
      <button class="skill" type="button" disabled><span class="skName">無我の境地</span><span class="skCost">必殺</span></button>

      <button class="skill" type="button"><span class="skName">大滝のぼり</span><span class="skCost">10</span></button>
      <button class="skill" type="button"><span class="skName">かげんぬい</span><span class="skCost">10</span></button>
      <button class="skill" type="button"><span class="skName">精神統一</span><span class="skCost">7</span></button>
      <button class="skill selected" type="button"><span class="skName">ぬう</span><span class="skCost">5</span></button>

      <button class="skill" type="button"><span class="skName">たすきぬい</span><span class="skCost">7</span></button>
      <button class="skill" type="button"><span class="skName">半かげんぬい</span><span class="skCost">12</span></button>
      <button class="skill" type="button"><span class="skName">糸ほぐし</span><span class="skCost">16</span></button>
      <button class="skill finish" id="finishBtn" type="button"><span class="skName">しあげる</span><span class="skCost">終了</span></button>
    </section>
  </main>

  <!-- 結果オーバーレイ(しあげるタップで表示されるデモ) -->
  <div class="resultScrim" id="resultScrim" hidden>
    <div class="resultWin">
      <div class="resultLabel">できのよさ</div>
      <div class="resultStars">★★★<span class="starOff"></span></div>
      <div class="resultRows">
        <div class="resultRow"><span>使用ターン数</span><b>14</b></div>
        <div class="resultRow"><span>残り集中力</span><b>23</b></div>
      </div>
      <div class="resultBtns">
        <button class="resultBtn" id="copyBtn" type="button">リプレイをコピー</button>
        <button class="resultBtn primary" id="againBtn" type="button">もう一度</button>
      </div>
      <button class="resultUndo" id="resultUndo" type="button">↩ 1手戻す(盤面を確認する)</button>
    </div>
  </div>

  <div class="caption">UIモック v2.2(トーンB)— パワー行タップ=サイクル開閉(横スクロール可)/ メッセージ欄タップ=文言切替 / きらめき2個=精神統一残り2の表示例</div>
</div>

<script>
  // ぬいパワー行: サイクル開閉(案A: その場トグル)
  document.getElementById('powerRow').addEventListener('click', (e) => {
    e.currentTarget.classList.toggle('cycleOpen');
  });

  // メッセージ欄: タップで文言サンプルを順送り(D45 の全パターン確認用)
  const messages = [
    '消費集中力が 半分になった！',
    '消費集中力が1.5倍で 会心率アップ！',
    '1つのマスの 威力と会心率がアップ！',
    '奇跡の効果で 集中力が 30アップ！',
    '光の効果で ひっさつチャージ！！',
    '',
  ];
  let msgIdx = 0;
  const msgWin = document.getElementById('msgWin');
  msgWin.addEventListener('click', () => {
    msgIdx = (msgIdx + 1) % messages.length;
    msgWin.textContent = messages[msgIdx];
  });

  // 特技選択(単一選択のトグル。しあげるは結果オーバーレイのデモへ)
  document.querySelectorAll('#skills .skill:not(:disabled)').forEach((b) => {
    if (b.id === 'finishBtn') return;
    b.addEventListener('click', () => {
      const was = b.classList.contains('selected');
      document.querySelectorAll('#skills .selected').forEach((x) => x.classList.remove('selected'));
      if (!was) b.classList.add('selected');
    });
  });

  // ---- 結果オーバーレイ(D40/D42〜D44) ----
  const resultScrim = document.getElementById('resultScrim');
  document.getElementById('finishBtn').addEventListener('click', () => {
    resultScrim.hidden = false;
  });
  // もう一度: レシピ・針はそのままで新規ゲーム(モックでは閉じるのみ)
  document.getElementById('againBtn').addEventListener('click', () => {
    resultScrim.hidden = true;
  });
  // 1手戻す: しあげる直前の状態へ戻る=オーバーレイを閉じる(モックでは閉じるのみ)
  document.getElementById('resultUndo').addEventListener('click', () => {
    resultScrim.hidden = true;
  });
  // リプレイをコピー(圧縮フォーマットは別途設計。ここではダミー文字列)
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.addEventListener('click', () => {
    const dummy = 'DQ10S-r1.AbC9xYz'; // 圧縮リプレイのダミー
    try { navigator.clipboard.writeText(dummy); } catch (e) { /* モックでは失敗しても続行 */ }
    const orig = copyBtn.textContent;
    copyBtn.textContent = 'コピーしました';
    setTimeout(() => { copyBtn.textContent = orig; }, 1500);
  });
</script>
</body>
</html>
