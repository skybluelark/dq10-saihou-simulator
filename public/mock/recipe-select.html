<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>レシピ選択画面モック</title>
<style>
  @font-face {
    font-family: 'GenEiLateMin';
    src: url('./assets/fonts/GenEiLateMinP_v2_subset.woff2') format('woff2');
    font-weight: normal; font-style: normal; font-display: swap;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  button, input, select { font-family: inherit; } /* フォーム部品はフォントを継承しないため明示 */
  body {
    font-family: 'GenEiLateMin', "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background:
      radial-gradient(circle at 30% 15%, rgba(255,244,205,.55), transparent 55%),
      linear-gradient(180deg, #cbb98f, #b7a276);
    color: #fff;
  }
  .frame { width: 100%; max-width: 430px; min-height: 100dvh; display: flex; flex-direction: column; }

  .adArea {
    height: 50px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    background: rgba(60,40,10,.12);
    border-bottom: 1px dashed rgba(60,40,10,.45); color: rgba(60,40,10,.55);
    font-size: 12px; letter-spacing: .15em;
  }

  header { display: flex; align-items: center; gap: 6px; height: 50px; padding: 0 6px; flex: 0 0 auto; }
  .hdrBtn {
    width: 76px; height: 40px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; gap: 2px;
    border-radius: 8px; font-size: 14px; font-weight: bold;
    background: linear-gradient(180deg, #6b4a26, #4c3116); color: #ffe9b8;
    border: 1px solid #2e1d0a; box-shadow: inset 0 1px 0 rgba(255,230,160,.5), 0 2px 3px rgba(40,20,0,.4);
  }
  .hdrSpacer { width: 76px; flex: 0 0 auto; }
  .hdrTitle { flex: 1 1 auto; text-align: center; font-size: 20px; font-weight: bold;
    color: #3a2a10; text-shadow: 0 1px 0 rgba(255,255,255,.5);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  main { flex: 1 1 auto; display: flex; flex-direction: column; gap: 8px; padding: 6px 12px 10px; min-height: 0; }

  .win {
    background: linear-gradient(180deg, #23255c, #14163e); color: #fff;
    border: 2px solid #fff; border-radius: 8px;
    box-shadow: 0 0 0 1px #14163e, 0 0 0 3px #caa74f, 0 3px 6px rgba(40,20,0,.35);
  }

  /* ---- 部位タブ(頭/体上/体下/腕/足/ラグ/ぬいぐるみ。横スクロール) ---- */
  .catTabs { display: flex; gap: 6px; overflow-x: auto; padding: 2px;
    scrollbar-width: none; flex: 0 0 auto; }
  .catTabs::-webkit-scrollbar { display: none; }
  .catTab { flex: 0 0 auto; height: 36px; padding: 0 14px; border-radius: 18px;
    font-size: 13px; font-weight: bold;
    background: rgba(60,40,10,.18); color: #4a3616; border: 1px solid rgba(60,40,10,.35); }
  .catTab.on { background: linear-gradient(180deg, #23255c, #14163e); color: #fff;
    border: 1px solid #fff; box-shadow: 0 0 0 2px #caa74f; }

  /* ---- フィルター(たたみ)+ソート ---- */
  .toolRow { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
  .toolBtn { height: 32px; padding: 0 12px; border-radius: 8px; font-size: 12px; font-weight: bold;
    background: linear-gradient(180deg, #6b4a26, #4c3116); color: #ffe9b8;
    border: 1px solid #2e1d0a; box-shadow: inset 0 1px 0 rgba(255,230,160,.5); }
  .sortBtn { margin-left: auto; }
  .filterPanel { display: none; padding: 8px; flex: 0 0 auto; flex-direction: column; gap: 8px; }
  .filterPanel.open { display: flex; }
  /* ラベルと選択肢は同一行(改行しない)。ラベル幅を固定し「すべて」の開始位置を行間で揃える */
  .filterRow { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
  .filterLabel { font-size: 11px; font-weight: bold; color: #ffe9b8; width: 88px; flex: 0 0 auto; }
  /* 選択肢は横スクロール(装備可能レベル=「すべて」+実在Lvの降順) */
  .fChipScroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    flex: 1 1 0; min-width: 0; padding: 2px 0; }
  .fChipScroll::-webkit-scrollbar { display: none; }
  .fChip { flex: 0 0 auto; height: 28px; padding: 0 10px; border-radius: 14px; font-size: 11px; font-weight: bold;
    background: #2c2f6b; color: #cdd3ff; border: 1px solid rgba(255,255,255,.5); }
  .fChip.on { background: linear-gradient(180deg, #b6903a, #8d6a1f); color: #fff; border-color: #fff; }
  /* ソート記号は小型三角(▾/▴)。本体文字より一回り小さく表示 */
  .sortMark { font-size: 10px; }

  /* ---- レシピ一覧(この画面ではリストが高さの伸縮を吸収する) ---- */
  .recipeList { flex: 1 1 auto; min-height: 120px; overflow-y: auto; padding: 6px; }
  .recipeRow { display: flex; align-items: center; gap: 8px; width: 100%;
    min-height: 48px; padding: 4px 8px; border-radius: 6px; border: none;
    background: transparent; color: #fff; font: inherit; text-align: left; }
  .recipeRow + .recipeRow { border-top: 1px solid rgba(255,255,255,.18); border-radius: 0; }
  .recipeRow.sel { background: linear-gradient(180deg, #b6903a, #8d6a1f); border-radius: 6px; }
  .recipeName { flex: 1 1 auto; font-size: 15px; font-weight: bold; }
  .recipeLv { flex: 0 0 auto; font-size: 11px; color: #cdd3ff; }
  .recipeRow.sel .recipeLv { color: #ffe9b8; }
  /* 布特性バッジは文字数によらず固定幅+中央揃え */
  .clothBadge { flex: 0 0 auto; width: 50px; text-align: center;
    font-size: 11px; font-weight: bold; padding: 3px 0; border-radius: 10px; }
  .cb-regen   { background: #2e9e44; color: #fff; }
  .cb-rainbow { background: #d9c23a; color: #4a3a00; }
  .cb-light   { background: #e77fb4; color: #fff; }
  .cb-normal  { background: #b9a77f; color: #3a2c10; }

  /* ---- さいほう針・できのよさ ---- */
  .needlePanel { padding: 8px; flex: 0 0 auto; display: flex; flex-direction: column; gap: 8px; }
  .rowLabel { font-size: 12px; font-weight: bold; color: #ffe9b8; }
  .needleRow { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 2px; }
  .needleRow::-webkit-scrollbar { display: none; }
  .needleChip { flex: 0 0 auto; height: 34px; padding: 0 10px; border-radius: 8px;
    font-size: 12px; font-weight: bold; background: #2c2f6b; color: #cdd3ff;
    border: 1px solid rgba(255,255,255,.5); }
  .needleChip.on { background: linear-gradient(180deg, #b6903a, #8d6a1f); color: #fff; border-color: #fff; }
  .starRow { display: flex; gap: 6px; align-items: center; }
  .starChip { flex: 0 0 auto; width: 52px; height: 32px; border-radius: 8px;
    font-size: 13px; font-weight: bold; background: #2c2f6b; color: #cdd3ff;
    border: 1px solid rgba(255,255,255,.5); }
  .starChip.on { background: linear-gradient(180deg, #b6903a, #8d6a1f); color: #fff; border-color: #fff; }
  /* 開始集中力: できのよさの右側。ラベル同士の縦位置を揃え、数値はラベル下に中央配置 */
  .bottomRow { display: flex; align-items: flex-start; gap: 12px; }
  .starCol { flex: 0 0 auto; display: flex; flex-direction: column; gap: 4px; }
  .starCol .rowLabel, .concCol .rowLabel { line-height: 1; }
  .concCol { flex: 1 1 auto; display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .concNum { font-size: 20px; font-weight: bold; color: #fff; line-height: 32px; }

  /* ---- はじめる ---- */
  .startBtn { flex: 0 0 auto; height: 52px; margin: 0 24px; border-radius: 10px;
    font-size: 18px; font-weight: bold; letter-spacing: .3em; text-indent: .3em;
    background: linear-gradient(180deg, #b6903a, #8d6a1f); color: #fff;
    border: 2px solid #fff; box-shadow: 0 0 0 1px #14163e, 0 0 0 3px #caa74f, 0 3px 6px rgba(40,20,0,.35); }

  .caption { text-align: center; font-size: 10px; color: rgba(60,40,10,.55); padding: 2px 0 6px; flex: 0 0 auto; }
</style>
</head>
<body>
<div class="frame">
  <div class="adArea">アンカー広告(全幅・高さ50〜90dp可変)</div>

  <header>
    <button class="hdrBtn" type="button" title="トップへ(モックでは未遷移)">◀ もどる</button>
    <div class="hdrTitle">レシピをえらぶ</div>
    <div class="hdrSpacer"></div>
  </header>

  <main>
    <!-- 部位タブ -->
    <nav class="catTabs" id="catTabs">
      <button class="catTab on" type="button">頭</button>
      <button class="catTab" type="button">体上</button>
      <button class="catTab" type="button">体下</button>
      <button class="catTab" type="button">腕</button>
      <button class="catTab" type="button">足</button>
      <button class="catTab" type="button">ラグ</button>
      <button class="catTab" type="button">ぬいぐるみ</button>
    </nav>

    <!-- フィルター(デフォルトたたみ)+ソート -->
    <div class="toolRow">
      <button class="toolBtn" id="filterToggle" type="button">フィルター ▸</button>
      <button class="toolBtn sortBtn" id="sortBtn" type="button">装備Lv <span class="sortMark">▼</span></button>
    </div>
    <section class="filterPanel win" id="filterPanel">
      <div class="filterRow">
        <span class="filterLabel">装備可能レベル</span>
        <div class="fChipScroll" id="lvChips"><!-- すべて+実在Lv降順(JSで生成) --></div>
      </div>
      <div class="filterRow">
        <span class="filterLabel">布特性</span>
        <div class="fChipScroll">
          <button class="fChip on" type="button">すべて</button>
          <button class="fChip" type="button">通常</button>
          <button class="fChip" type="button">再生</button>
          <button class="fChip" type="button">虹</button>
          <button class="fChip" type="button">光</button>
        </div>
      </div>
    </section>

    <!-- レシピ一覧(頭・実データ8件。装備Lvはダミー値) -->
    <section class="recipeList win" id="recipeList"></section>

    <!-- さいほう針・できのよさ+開始集中力 -->
    <section class="needlePanel win">
      <div>
        <div class="rowLabel">さいほう針</div>
        <div class="needleRow" id="needleRow"></div>
      </div>
      <div class="bottomRow">
        <div class="starCol">
          <div class="rowLabel">できのよさ</div>
          <div class="starRow" id="starRow">
            <button class="starChip" type="button">★0</button>
            <button class="starChip" type="button">★1</button>
            <button class="starChip" type="button">★2</button>
            <button class="starChip" type="button">★3</button>
          </div>
        </div>
        <div class="concCol">
          <div class="rowLabel">開始集中力</div>
          <div class="concNum" id="concVal">207</div>
        </div>
      </div>
    </section>

    <button class="startBtn" type="button" onclick="location.href='./index.html'">はじめる</button>
  </main>

  <div class="caption">レシピ選択画面モック v2 — 装備Lv・フィルター値はダミー / 針・できのよさの選択は保存されます</div>
</div>

<script>
  // ---- レシピ一覧(頭・実データ。装備Lvはダミー値) ----
  const CLOTH = { regen: ['再生布', 'cb-regen'], rainbow: ['虹布', 'cb-rainbow'], light: ['光布', 'cb-light'], normal: ['通常布', 'cb-normal'] };
  const recipes = [
    { name: '賢哲のターバン', cloth: 'rainbow', lv: 108 },
    { name: '巨商のターバン', cloth: 'light', lv: 105 },
    { name: '聖翼の髪飾り', cloth: 'rainbow', lv: 102 },
    { name: '空賊のバンダナ', cloth: 'light', lv: 99 },
    { name: 'しっこくのターバン', cloth: 'regen', lv: 96 },
    { name: 'ロードリーコサージ', cloth: 'regen', lv: 93 },
    { name: 'スパングルフェザー', cloth: 'light', lv: 90 },
    { name: 'ふしぎなぼうし', cloth: 'rainbow', lv: 85 },
  ];
  const list = document.getElementById('recipeList');
  let sortDesc = true;
  let selectedName = recipes[0].name;
  function renderList() {
    const rows = [...recipes].sort((a, b) => sortDesc ? b.lv - a.lv : a.lv - b.lv);
    list.innerHTML = '';
    rows.forEach((r) => {
      const [label, cls] = CLOTH[r.cloth];
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'recipeRow' + (r.name === selectedName ? ' sel' : '');
      btn.innerHTML = '<span class="recipeName">' + r.name + '</span>'
        + '<span class="recipeLv">装備Lv' + r.lv + '</span>'
        + '<span class="clothBadge ' + cls + '">' + label + '</span>';
      btn.addEventListener('click', () => { selectedName = r.name; renderList(); });
      list.appendChild(btn);
    });
  }
  renderList();

  // ---- ソート(装備Lv 降順▼/昇順▲のみ。記号は小型表示) ----
  const sortBtn = document.getElementById('sortBtn');
  sortBtn.addEventListener('click', () => {
    sortDesc = !sortDesc;
    sortBtn.innerHTML = '装備Lv <span class="sortMark">' + (sortDesc ? '▼' : '▲') + '</span>';
    renderList();
  });

  // ---- 装備可能レベルの選択肢(「すべて」+実在Lvの降順、横スクロール) ----
  const lvChips = document.getElementById('lvChips');
  const lvValues = [...new Set(recipes.map(r => r.lv))].sort((a, b) => b - a);
  ['すべて', ...lvValues].forEach((v, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'fChip' + (i === 0 ? ' on' : '');
    b.textContent = String(v);
    lvChips.appendChild(b);
  });

  // ---- フィルター開閉(デフォルトたたみ) ----
  const filterToggle = document.getElementById('filterToggle');
  const filterPanel = document.getElementById('filterPanel');
  filterToggle.addEventListener('click', () => {
    const open = filterPanel.classList.toggle('open');
    filterToggle.textContent = open ? 'フィルター ▾' : 'フィルター ▸';
  });
  // フィルター内チップ(行ごとに単一選択。絞り込み動作はフォーマット確定後に実装)
  document.querySelectorAll('.filterRow').forEach((row) => {
    row.addEventListener('click', (e) => {
      const btn = e.target.closest('.fChip');
      if (!btn) return;
      row.querySelectorAll('.on').forEach(x => x.classList.remove('on'));
      btn.classList.add('on');
    });
  });

  // ---- さいほう針(並びは光→銅)+開始集中力(内訳なし) ----
  const needles = [
    { name: '光のさいほう針', conc: 45 },
    { name: '奇跡のさいほう針', conc: 50 },
    { name: '超さいほう針', conc: 35 },
    { name: 'プラチナさいほう針', conc: 25 },
    { name: '銀のさいほう針', conc: 15 },
    { name: '鉄のさいほう針', conc: 10 },
    { name: '銅のさいほう針', conc: 0 },
  ];
  const LEVEL_BASE = 207; // Lv80基礎
  const NEEDLE_KEY = 'saihou-mock-needle';
  const STAR_KEY = 'saihou-mock-star';
  const needleRow = document.getElementById('needleRow');
  const concVal = document.getElementById('concVal');
  const savedNeedle = localStorage.getItem(NEEDLE_KEY) || needles[needles.length - 1].name;
  needles.forEach((n) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'needleChip' + (n.name === savedNeedle ? ' on' : '');
    b.textContent = n.name;
    if (n.name === savedNeedle) concVal.textContent = LEVEL_BASE + n.conc;
    b.addEventListener('click', () => {
      needleRow.querySelectorAll('.on').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      concVal.textContent = LEVEL_BASE + n.conc;
      localStorage.setItem(NEEDLE_KEY, n.name);
    });
    needleRow.appendChild(b);
  });

  // ---- できのよさ(★。最終選択を保持) ----
  const starRow = document.getElementById('starRow');
  const savedStar = localStorage.getItem(STAR_KEY) || '★0';
  starRow.querySelectorAll('.starChip').forEach((b) => {
    if (b.textContent === savedStar) b.classList.add('on');
    b.addEventListener('click', () => {
      starRow.querySelectorAll('.on').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      localStorage.setItem(STAR_KEY, b.textContent);
    });
  });
</script>
</body>
</html>
