  :root {
    color-scheme: light dark;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #2b2b2e;
    background-image:
      linear-gradient(45deg, #333 25%, transparent 25%),
      linear-gradient(-45deg, #333 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #333 75%),
      linear-gradient(-45deg, transparent 75%, #333 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
  }

  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .label {
    font-family: sans-serif;
    color: #ddd;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .asset-row {
    display: flex;
    gap: 40px;
    align-items: flex-end;
  }

  .badge-wrap {
    position: relative;
    font-family: 'GenEiLateMin', sans-serif;
    font-size: 96px;
    line-height: 1;
    filter: drop-shadow(0 4px 3px rgba(0,0,0,0.55));
  }

  .badge-wrap.small {
    font-size: 56px;
  }

  /* 縁取りレイヤー（塗りは透明にして縁だけ見せる） */
  .badge-stroke {
    -webkit-text-stroke: 6px #111111;
    color: transparent;
  }

  .badge-wrap.small .badge-stroke {
    -webkit-text-stroke: 4px #111111;
  }

  /* グラデーション塗りレイヤー（縁の内側に重ねる） */
  .badge-fill {
    position: absolute;
    inset: 0;
    background: var(--fill-gradient, #ffffff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .fill-white   { --fill-gradient: linear-gradient(180deg, #ffffff 0%, #e7e7e7 100%); }
  .fill-yellow  { --fill-gradient: linear-gradient(180deg, #fff3b0 0%, #e8b93f 100%); }
  .fill-pink    { --fill-gradient: linear-gradient(180deg, #ffd6e6 0%, #e893b3 100%); }
</style>
