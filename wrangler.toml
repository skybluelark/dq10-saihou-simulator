# Cloudflare Pages 構成 (docs/PUBLISHING.md 参照)
# デモアプリ(ブラウザ版)を Cloudflare Pages へ Direct Upload するための設定。
# デプロイは公開用リポジトリ(fluoritedq10)の GitHub Actions から
# `wrangler pages deploy` で行う。Git 連携ビルドは使わない(品質ゲートは Actions 側)。
#
# name は Cloudflare Pages のプロジェクト名 = <name>.pages.dev のサブドメイン(英小文字のみ)。
# ブランド "FluoNote" 確定(2026-07-12)により fluonote に確定。Cloudflare 側プロジェクト名と
# この値を必ず一致させること(不一致だと CI のデプロイ先がずれる)。
name = "fluonote"
compatibility_date = "2026-07-12"
pages_build_output_dir = "dist"
